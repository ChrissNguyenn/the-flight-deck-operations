name: Update Vietnam Weather

# Self-sustaining 60-second weather loop.
#
# GitHub throttles `schedule:` crons brutally (observed 1-3 h real gaps),
# so a run-per-minute design can't work. Instead ONE job runs a fetch/
# commit loop every 60 s for ~5h40m (under the 6 h job limit), and the
# half-hourly cron keeps a single QUEUED run waiting in the concurrency
# group — it takes over the moment the running loop ends, so coverage is
# continuous with no external pinger.

on:
  schedule:
    # Keep-alive + takeover queue; :07/:37 avoids the congested slots
    - cron: "7,37 * * * *"
  workflow_dispatch:            # manual start / instant restart

permissions:
  contents: write

# One loop at a time; new runs queue instead of cancelling the loop
concurrency:
  group: weather-update
  cancel-in-progress: false

jobs:
  weather:
    runs-on: ubuntu-latest
    timeout-minutes: 355        # hard stop under the 6 h job limit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip            # reuse installed deps — runs start faster

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch weather every 60 s, commit only on change
        env:
          MET_BASE_URL: ${{ secrets.MET_BASE_URL }}
          MET_USERNAME: ${{ secrets.MET_USERNAME }}
          MET_PASSWORD: ${{ secrets.MET_PASSWORD }}
        run: |
          git config user.name "acuro-weather-bot"
          git config user.email "actions@users.noreply.github.com"
          end=$((SECONDS + 20400))        # ~5h40m, exits before timeout
          while [ $SECONDS -lt $end ]; do
            iter=$SECONDS
            python fetch_weather_static.py || echo "::warning::fetch failed — retrying next minute"
            git add data/
            git diff --cached --quiet || git commit -m "wx update $(date -u '+%d %b %H:%MZ')"
            # push whatever is committed but not on origin yet (also picks
            # up code pushed meanwhile via the rebase)
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
              if ! git pull --rebase origin main; then
                git rebase --abort 2>/dev/null || true
                git reset --hard origin/main   # drop local wx commit; next loop refetches
              fi
              git push origin HEAD:main || echo "::warning::push failed — retrying next change"
            fi
            took=$((SECONDS - iter))
            [ $took -lt 60 ] && sleep $((60 - took))
          done
